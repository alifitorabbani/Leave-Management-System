# Server Configuration
server.port=8100

# Application Name
spring.application.name=manual-version-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/leave_manual_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres_manual
spring.datasource.password=leave123

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 Console
spring.h2.console.enabled=false

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Jakarta

# Logging Configuration
logging.level.root=INFO
logging.level.com.len.leave=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# AOP Configuration
spring.aop.auto=true
spring.aop.proxy-target-class=true

