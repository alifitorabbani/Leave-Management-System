# Server Configuration
server.port=8200

# Application Name
spring.application.name=flowable-version-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/leave_flowable_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres_flowable
spring.datasource.password=leave123

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 Console
spring.h2.console.enabled=false

# Flowable Configuration
flowable.database-schema-update=true
flowable.history=full
flowable.async-executor-activate=false
flowable.task-server-enabled=false

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Jakarta

# Logging Configuration
logging.level.root=INFO
logging.level.com.len.leave=DEBUG
logging.level.org.flowable=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


