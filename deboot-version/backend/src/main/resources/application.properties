# Server Configuration
server.port=8300

# Application Name
spring.application.name=deboot-version-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/leave_deboot_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres_deboot
spring.datasource.password=leave123

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 Console
spring.h2.console.enabled=false

# Flowable Configuration
flowable.database-schema-update=true
flowable.history=full

# Deboot Configuration
deboot.workflow.auto-register=true
deboot.workflow.annotation-scan=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Jakarta

# Logging Configuration
logging.level.root=INFO
logging.level.com.len.leave=DEBUG
logging.level.org.flowable=DEBUG


